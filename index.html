<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LINE OGP Encoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--panel:#0d0d14;--panel2:#111118;--border:#7fffb230;--border2:#7fffb250;
  --accent:#7fffb2;--accent2:#ff7f50;--accent3:#b07fff;--dim:#7fffb260;--text:#e0ffe8;--f:'Space Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;display:flex;flex-direction:column}

/* ── メニューバー ── */
.menubar{height:40px;background:var(--panel2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:0;position:sticky;top:0;z-index:200;font-size:11px;color:var(--dim);user-select:none;flex-shrink:0}
.traffic{display:flex;gap:5px;margin-right:10px;flex-shrink:0}
.traffic span{width:10px;height:10px;border-radius:50%;display:inline-block}
.t-r{background:#ff5f57}.t-y{background:#ffbd2e}.t-g{background:#28c840}
.mi{cursor:pointer;padding:0 10px;height:40px;display:flex;align-items:center;transition:color .15s;white-space:nowrap;font-size:11px}
.mi:hover{color:var(--accent)}
.title{flex:1;text-align:center;font-size:9.5px;letter-spacing:.1em;color:var(--dim);padding:0 4px}
.abadge{font-size:.48rem;background:var(--accent3);color:#0a0a0f;padding:1px 6px;letter-spacing:.08em;display:none;flex-shrink:0}

/* ── アプリ本体 ── */
.app{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 5rem;gap:1.2rem}
@media(max-width:480px){.app{padding:1rem .75rem 4rem;gap:1rem}}
.hdr{text-align:center}
.hdr h1{font-size:.85rem;letter-spacing:.22em;color:var(--accent);text-transform:uppercase}
.hdr p{margin-top:.35rem;font-size:.58rem;color:var(--dim);letter-spacing:.06em;line-height:1.6}

/* ── カード ── */
.card{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--border);padding:1.2rem 1.25rem}
@media(max-width:480px){.card{padding:1rem .9rem}}
.card.ac{border-color:var(--accent3)50}
.ct{font-size:.52rem;letter-spacing:.2em;color:var(--dim);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.ct::after{content:'';flex:1;height:1px;background:var(--border)}
.ct.at{color:var(--accent3)}.ct.at::after{background:var(--accent3)40}
.fg{margin-bottom:.9rem}
label{font-size:.55rem;letter-spacing:.12em;color:var(--dim);display:block;margin-bottom:.35rem}
label .opt{color:var(--dim);font-size:.5rem;margin-left:.3rem}
label .adm{color:var(--accent3);font-size:.5rem;margin-left:.3rem}

/* ── インプット ── */
textarea,input[type="text"],input[type="password"]{
  width:100%;background:#13131d;border:1px solid var(--border);color:var(--text);
  font-family:var(--f);font-size:.8rem;padding:.6rem .7rem;outline:none;
  transition:border-color .2s;-webkit-appearance:none;border-radius:0;min-height:48px}
@media(max-width:480px){
  textarea,input[type="text"],input[type="password"]{font-size:.9rem;min-height:52px;padding:.7rem .75rem}
}
textarea{resize:vertical;min-height:80px;line-height:1.6}
textarea:focus,input:focus{border-color:var(--accent)}
textarea::placeholder,input::placeholder{color:var(--dim)}
input[type="checkbox"]{width:18px;height:18px;min-height:0;margin-right:.45rem;accent-color:var(--accent3);cursor:pointer;flex-shrink:0}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:480px){.r2{grid-template-columns:1fr}}
.urow{display:flex;gap:.5rem}
.urow input{flex:1;min-width:0}
.uck{font-family:var(--f);font-size:.6rem;border:1px solid var(--border);background:transparent;color:var(--dim);padding:0 .85rem;cursor:pointer;white-space:nowrap;transition:border-color .2s,color .2s;min-height:48px;flex-shrink:0}
@media(max-width:480px){.uck{min-height:52px;font-size:.7rem}}
.uck:hover{border-color:var(--accent);color:var(--accent)}
.ust{margin-top:.3rem;font-size:.58rem;min-height:.9rem}
.ust.ok{color:var(--accent)}.ust.er{color:var(--accent2)}

/* ── ドロップゾーン ── */
.drop{border:1px dashed var(--border);background:#13131d;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem;cursor:pointer;transition:border-color .2s;padding:1rem;position:relative}
@media(max-width:480px){.drop{min-height:60px;padding:.8rem}}
.drop:hover,.drop.over{border-color:var(--accent)}
.drop .hint{font-size:.58rem;color:var(--dim);letter-spacing:.1em;pointer-events:none;text-align:center}
.drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;padding:0;border:none}
.ip{width:100%;max-height:130px;object-fit:contain;border:1px solid var(--border);display:none;margin-top:.45rem}
.ip.show{display:block}
.iinfo{font-size:.55rem;color:var(--dim);margin-top:.25rem}

/* ── ボタン ── */
.br{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.9rem}
button{font-family:var(--f);font-size:.65rem;letter-spacing:.12em;cursor:pointer;padding:.6rem 1.1rem;min-height:48px;border:1px solid var(--accent);background:transparent;color:var(--accent);text-transform:uppercase;transition:background .15s,color .15s;-webkit-appearance:none;border-radius:0}
@media(max-width:480px){
  button{font-size:.72rem;min-height:52px;padding:.65rem 1rem}
  .br{flex-direction:column}.br button{width:100%}
}
button:hover,button:active{background:var(--accent);color:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed}
button.d{border-color:var(--accent2);color:var(--accent2)}
button.d:hover{background:var(--accent2);color:var(--bg)}
button.ab{border-color:var(--accent3);color:var(--accent3)}
button.ab:hover{background:var(--accent3);color:var(--bg)}

/* ── ローダー ── */
.ldr{display:none;align-items:center;gap:.6rem;font-size:.62rem;color:var(--accent);letter-spacing:.1em;margin-top:.7rem}
.ldr.show{display:flex}
.spin{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.oc{display:none}.oc.vis{display:block}

/* ── 生成リンク表示 ── */
.rurl{background:#13131d;border:1px solid var(--border);padding:.8rem;font-size:.78rem;color:var(--accent);word-break:break-all;line-height:1.6;position:relative;min-height:48px}
@media(max-width:480px){.rurl{font-size:.85rem;padding:.75rem}}
.cpb{position:absolute;top:.4rem;right:.4rem;font-size:.5rem;color:var(--bg);background:var(--accent);padding:2px 6px;opacity:0;transition:opacity .3s;pointer-events:none}
.cpb.show{opacity:1}
.idr{margin-top:.45rem;font-size:.58rem;color:var(--dim)}

/* ── 履歴 ── */
.hl{display:flex;flex-direction:column;gap:.4rem}
.hi{background:var(--panel);border:1px solid var(--border);padding:.6rem .85rem;display:flex;align-items:center;gap:.55rem;font-size:.65rem;cursor:pointer;transition:border-color .15s;min-height:52px}
.hi:hover{border-color:var(--accent)}
.hi.ahi{border-left:2px solid var(--accent3)}
.ht{width:36px;height:36px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.he{width:36px;height:36px;background:#1a1a25;flex-shrink:0;border:1px solid var(--border)}
.hu{width:36px;height:36px;background:#13131d;flex-shrink:0;border:1px solid var(--accent2);display:flex;align-items:center;justify-content:center;font-size:.48rem;color:var(--accent2)}
.hitxt{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;font-size:.7rem}
.hiid{color:var(--dim);font-size:.55rem;flex-shrink:0}
.hcp{color:var(--accent2);font-size:.58rem;flex-shrink:0;padding:6px 8px;min-height:0;border:1px solid var(--accent2)30}
@media(max-width:480px){.hiid{display:none}.hcp{font-size:.65rem}}

/* ── モーダル ── */
.mbg{display:none;position:fixed;inset:0;background:#000c;z-index:500;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:480px){.mbg{align-items:center;padding:1rem}}
.mbg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border2);padding:1.6rem 1.4rem;width:100%;max-width:400px;border-bottom:none}
@media(min-width:480px){.modal{border-bottom:1px solid var(--border2)}}
.mt{font-size:.7rem;letter-spacing:.2em;color:var(--accent3);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.mx{cursor:pointer;color:var(--dim);font-size:1.1rem;line-height:1;padding:6px;border:none;background:none;font-family:var(--f);min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center}
.mst{font-size:.62rem;margin-top:.5rem;min-height:.9rem}
.mst.ok{color:var(--accent)}.mst.er{color:var(--accent2)}

/* ── 通知 ── */
.ntf{position:fixed;bottom:1.2rem;right:1rem;left:1rem;background:var(--accent);color:var(--bg);font-size:.65rem;letter-spacing:.1em;padding:.55rem 1rem;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;text-align:center;max-width:420px;margin:0 auto}
.ntf.show{opacity:1;transform:translateY(0)}
.ntf.er{background:var(--accent2)}
@media(min-width:480px){.ntf{left:auto;right:1.5rem;max-width:300px;text-align:left;margin:0}}

/* ── OGプレビュー ── */
.ogprev{display:none;margin-top:.5rem;background:#13131d;border:1px solid var(--border);padding:.6rem;display:flex;gap:.6rem;align-items:center}
.ogprev.show{display:flex}
.ogprev img{width:60px;height:40px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.ogprev .ogt{font-size:.65rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── チェックボックス行 ── */
.cbrow{display:flex;align-items:center;cursor:pointer;gap:.4rem;padding:.3rem 0;min-height:40px}
.cbrow span{font-size:.6rem;color:var(--dim);line-height:1.4}
@media(max-width:480px){.cbrow{min-height:44px}.cbrow span{font-size:.68rem}}
</style>
</head>
<body>

<div class="menubar">
  <div class="traffic"><span class="t-r"></span><span class="t-y"></span><span class="t-g"></span></div>
  <span class="mi" onclick="toggleHist()">History</span>
  <span class="mi" onclick="openBug()">Bug</span>
  <span class="mi" id="adminMi" onclick="toggleAdmin()">Admin</span>
  <div class="title">LINE OGP ENCODER v3.2</div>
  <span id="abadge" class="abadge">ADMIN</span>
</div>

<div class="app">
  <div class="hdr">
    <h1>OGP Link Encoder</h1>
    <p>テキスト / URL / 画像 → 短いリンク → LINE プレビュー＆サイト埋め込み</p>
  </div>

  <div class="card">
    <div class="ct">COMPOSE</div>
    <div class="fg">
      <label>メッセージ <span class="opt">(省略可)</span></label>
      <textarea id="msgI" placeholder="LINEに表示したいテキスト..."></textarea>
    </div>
    <div class="fg">
      <label>リンク先URL <span class="opt">(省略可)</span></label>
      <div class="urow">
        <input type="text" id="urlI" placeholder="https://example.com" oninput="onUrl()">
        <button class="uck" onclick="checkUrl()">CHECK</button>
      </div>
      <div class="ust" id="ust"></div>
      <!-- og:image fetch option -->
      <label class="cbrow" style="margin-top:.5rem">
        <input type="checkbox" id="fetchOg" onchange="onFetchOg()">
        <span>URLからog:imageを取得してLINEプレビュー画像に使う</span>
      </label>
      <div class="ogprev" id="ogprev">
        <img id="ogimg" src="" alt="og:image">
        <div class="ogt" id="ogtitle"></div>
      </div>
    </div>
    <div class="fg">
      <label>画像アップロード <span class="opt">(省略可、URLのog:imageより優先)</span></label>
      <div class="drop" id="dz">
        <input type="file" id="fileI" accept="image/*" onchange="onFile(event)">
        <span class="hint">CLICK OR DROP IMAGE HERE</span>
      </div>
      <img class="ip" id="iprev" alt="preview">
      <div class="iinfo" id="iinfo"></div>
    </div>

    <!-- Admin options -->
    <div id="aopts" style="display:none">
      <div class="card ac" style="margin-bottom:.9rem;padding:1rem">
        <div class="ct at">ADMIN OPTIONS</div>
        <div class="r2">
          <div class="fg" style="margin-bottom:0">
            <label>カスタムスラグ <span class="adm">ADMIN</span></label>
            <input type="text" id="slugI" placeholder="my-link" maxlength="32">
          </div>
          <div class="fg" style="margin-bottom:0;display:flex;align-items:flex-end">
            <label class="cbrow" style="padding-bottom:.55rem">
              <input type="checkbox" id="noComp">
              <span>圧縮なし <span class="adm">ADMIN</span></span>
            </label>
          </div>
        </div>
        <div style="margin-top:.6rem">
          <label class="cbrow">
            <input type="checkbox" id="permI">
            <span>永久保存（TTLなし）<span class="adm">ADMIN</span></span>
          </label>
        </div>
      </div>
    </div>

    <div class="br">
      <button id="genBtn" onclick="doGen()">Generate Link</button>
      <button class="d" onclick="clearAll()">Clear</button>
    </div>
    <div class="ldr" id="ldr"><div class="spin"></div><span>UPLOADING...</span></div>
  </div>

  <div class="oc card" id="oc">
    <div class="ct">GENERATED LINK</div>
    <div style="position:relative">
      <div class="rurl" id="rurl"></div>
      <div class="cpb" id="cpb">COPIED!</div>
    </div>
    <div class="idr" id="idr"></div>
    <div class="br">
      <button onclick="cpLink()">Copy Link</button>
      <button onclick="openLink()">Open</button>
    </div>
  </div>

  <div class="card" id="histC" style="display:none">
    <div class="ct">HISTORY</div>
    <div class="hl" id="hl"></div>
    <div class="br"><button class="d" onclick="clearH()">Clear History</button></div>
  </div>
</div>

<!-- Admin Login Modal -->
<div class="mbg" id="amg" onclick="if(event.target===this)closeAdmin()">
  <div class="modal">
    <div class="mt"><span>ADMIN LOGIN</span><button class="mx" onclick="closeAdmin()">✕</button></div>
    <div class="fg"><label>Username</label><input type="text" id="au" placeholder="admin"></div>
    <div class="fg"><label>Password</label><input type="password" id="ap" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="br" style="margin-top:0">
      <button class="ab" onclick="doLogin()">Login</button>
      <button class="d" onclick="closeAdmin()">Cancel</button>
    </div>
    <div class="mst" id="ast"></div>
  </div>
</div>

<!-- Bug Report Modal -->
<div class="mbg" id="bmg" onclick="if(event.target===this)closeBug()">
  <div class="modal">
    <div class="mt"><span>BUG REPORT</span><button class="mx" onclick="closeBug()">✕</button></div>
    <div style="font-size:.55rem;color:var(--dim);line-height:1.5;margin-bottom:.8rem">エラー内容・手順・ブラウザを記入してください</div>
    <textarea id="bugT" style="min-height:100px;margin-bottom:.8rem" placeholder="例: プロキシでCSSが崩れる…"></textarea>
    <div class="br" style="margin-top:0">
      <button id="bugBtn" onclick="subBug()">Send</button>
      <button class="d" onclick="closeBug()">Cancel</button>
    </div>
    <div class="mst" id="bst"></div>
  </div>
</div>

<div class="ntf" id="ntf"></div>

<script>
const W = "https://proud-mode-cd1a.a6068376.workers.dev";
const HK = "ogp_hist_v4";
let curUrl="", imgB64=null, imgMime=null, adm=null, ogData=null;

function init(){
  renderH();
  try{const s=JSON.parse(sessionStorage.getItem("__adm")||"null");if(s)adm=s,updAdm();}catch(e){}
}

// ── Admin ────────────────────────────────────────────────
function toggleAdmin(){adm?logoutAdm():document.getElementById("amg").classList.add("show");}
function closeAdmin(){document.getElementById("amg").classList.remove("show");}
async function doLogin(){
  const u=document.getElementById("au").value.trim(),p=document.getElementById("ap").value;
  const st=document.getElementById("ast");
  if(!u||!p){st.textContent="入力してください";st.className="mst er";return;}
  document.querySelector(".ab").disabled=true;
  st.textContent="確認中…";st.className="mst";
  try{
    const r=await fetch(W+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user:u,pass:p})});
    const d=await r.json();
    if(d.ok){
      adm={user:u,pass:p,level:d.level};
      sessionStorage.setItem("__adm",JSON.stringify(adm));
      updAdm();closeAdmin();notify("ログイン: "+d.level);
    }else{st.textContent="認証失敗";st.className="mst er";}
  }catch(e){st.textContent="エラー";st.className="mst er";}
  finally{document.querySelector(".ab").disabled=false;}
}
function logoutAdm(){adm=null;sessionStorage.removeItem("__adm");updAdm();notify("ログアウトしました");}
function updAdm(){
  const on=!!adm;
  document.getElementById("aopts").style.display=on?"block":"none";
  document.getElementById("abadge").style.display=on?"inline":"none";
  document.getElementById("adminMi").textContent=on?"Logout":"Admin";
  document.getElementById("adminMi").style.color=on?"var(--accent3)":"";
  // ログイン時はチェックボックスをデフォルトOFFにリセット
  if(on){
    const permI=document.getElementById("permI");
    const noComp=document.getElementById("noComp");
    if(permI)permI.checked=false;
    if(noComp)noComp.checked=false;
  }
}

// ── og:image fetch ────────────────────────────────────────
async function onFetchOg(){
  const cb=document.getElementById("fetchOg");
  const urlVal=document.getElementById("urlI").value.trim();
  const prev=document.getElementById("ogprev");
  if(!cb.checked||!urlVal){prev.classList.remove("show");ogData=null;return;}
  try{new URL(urlVal);}catch{return;}
  cb.disabled=true;
  try{
    const r=await fetch(W+"/store",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:"",url:urlVal,fetchOgImage:true,
        ...(adm?{adminUser:adm.user,adminPass:adm.pass}:{})})});
    // We just want the ogImage, not actually store - use a temp call
    // Actually use the og meta from a HEAD-like call
    // For now, just show a placeholder
  }catch(e){}
  // Simple: fetch the URL's og:image via the worker proxy
  try{
    const proxyUrl=W+"/x/"+urlVal;
    // We can't parse HTML here, show the url instead
    document.getElementById("ogtitle").textContent=urlVal.slice(0,50)+"…";
    prev.classList.add("show");
    ogData={fetchOgImage:true};
  }catch(e){prev.classList.remove("show");ogData=null;}
  cb.disabled=false;
}
function onUrl(){
  document.getElementById("ust").textContent="";
  document.getElementById("ust").className="ust";
  document.getElementById("fetchOg").checked=false;
  document.getElementById("ogprev").classList.remove("show");
  ogData=null;
}
function checkUrl(){
  const v=document.getElementById("urlI").value.trim();
  const el=document.getElementById("ust");
  if(!v)return;
  try{new URL(v);el.textContent="✓ 有効なURLです";el.className="ust ok";}
  catch{el.textContent="✗ URLの形式が正しくありません";el.className="ust er";}
}

// ── Image ─────────────────────────────────────────────────
const dz=document.getElementById("dz");
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("over");});
dz.addEventListener("dragleave",()=>dz.classList.remove("over"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("over");const f=e.dataTransfer?.files?.[0];if(f)loadImg(f);});
function onFile(e){const f=e.target.files?.[0];if(f)loadImg(f);}
function loadImg(file){
  if(!file.type.startsWith("image/")){notify("画像ファイルを選択してください",true);return;}
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const noC=adm&&document.getElementById("noComp").checked;
      let w=img.width,h=img.height;
      if(!noC){const M=1200;if(w>M||h>M){const s=Math.min(M/w,M/h);w=Math.round(w*s);h=Math.round(h*s);}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      const mime=file.type==="image/png"?"image/png":"image/jpeg";
      const b64=c.toDataURL(mime,mime==="image/jpeg"?(noC?1:.82):undefined);
      imgB64=b64;imgMime=mime;
      const kb=Math.round(b64.length*.75/1024);
      document.getElementById("iprev").src=b64;document.getElementById("iprev").classList.add("show");
      document.getElementById("iinfo").textContent=`${w}×${h}px  ~${kb}KB${noC?" (無圧縮)":""}`;
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

// ── Generate ──────────────────────────────────────────────
async function doGen(){
  const text=document.getElementById("msgI").value.trim();
  const urlVal=document.getElementById("urlI").value.trim();
  if(!text&&!imgB64&&!urlVal){notify("入力してください",true);return;}
  setLdr(true);
  try{
    const body={text};
    if(urlVal){body.url=urlVal;}
    if(imgB64){body.imageB64=imgB64;body.mimeType=imgMime;}
    if(document.getElementById("fetchOg").checked&&urlVal) body.fetchOgImage=true;
    if(adm){
      body.adminUser=adm.user;body.adminPass=adm.pass;
      const slug=document.getElementById("slugI").value.trim().replace(/[^a-zA-Z0-9_-]/g,"");
      if(slug)body.slug=slug;
      body.noCompress=document.getElementById("noComp").checked;
      body.permanent=document.getElementById("permI").checked;
    }
    const res=await fetch(W+"/store",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok)throw new Error(await res.text());
    const{id,url,admin,permanent}=await res.json();
    curUrl=url;
    document.getElementById("rurl").textContent=url;
    document.getElementById("idr").textContent=`id: ${id}  ${permanent?"[PERM 永久保存]":"(90日)"}`;
    document.getElementById("oc").classList.add("vis");
    const hist=getH();
    const entry={id,url,text,targetUrl:urlVal,hasImage:!!imgB64,admin:!!admin,permanent:!!permanent,ts:Date.now()};
    saveH([entry,...hist.filter(h=>h.id!==id)].slice(0,30));
    renderH();notify("リンク生成完了！");
  }catch(e){notify("エラー: "+e.message,true);}
  finally{setLdr(false);}
}
function setLdr(v){document.getElementById("ldr").classList.toggle("show",v);document.getElementById("genBtn").disabled=v;}
function cpLink(){if(!curUrl)return;navigator.clipboard.writeText(curUrl).then(()=>{const b=document.getElementById("cpb");b.classList.add("show");setTimeout(()=>b.classList.remove("show"),1800);notify("コピーしました");});}
function openLink(){if(curUrl)window.open(curUrl,"_blank");}
function clearAll(){
  ["msgI","urlI","slugI"].forEach(id=>{const e=document.getElementById(id);if(e)e.value="";});
  document.getElementById("ust").textContent="";
  document.getElementById("iprev").classList.remove("show");document.getElementById("iprev").src="";
  document.getElementById("iinfo").textContent="";document.getElementById("fileI").value="";
  document.getElementById("oc").classList.remove("vis");
  document.getElementById("fetchOg").checked=false;document.getElementById("ogprev").classList.remove("show");
  ["noComp","permI"].forEach(id=>{const e=document.getElementById(id);if(e)e.checked=false;});
  imgB64=null;imgMime=null;curUrl="";ogData=null;
}

// ── History ───────────────────────────────────────────────
function getH(){try{return JSON.parse(localStorage.getItem(HK)||"[]");}catch{return[];}}
function saveH(a){localStorage.setItem(HK,JSON.stringify(a));}
function toggleHist(){const c=document.getElementById("histC");c.style.display=c.style.display==="none"?"block":"none";if(c.style.display==="block")renderH();}
function clearH(){saveH([]);renderH();notify("履歴削除");}
function renderH(){
  const list=document.getElementById("hl"),hist=getH();
  if(!hist.length){list.innerHTML='<div style="font-size:.62rem;color:var(--dim)">履歴なし</div>';return;}
  list.innerHTML=hist.map((h,i)=>{
    let th=h.hasImage?`<img class="ht" src="${W}/img/${h.id}" loading="lazy" alt="">`:
           h.targetUrl?`<div class="hu">URL</div>`:`<div class="he"></div>`;
    return `<div class="hi${h.admin?" ahi":""}" onclick="reuse(${i})">${th}<div class="hitxt">${eh(h.text||h.targetUrl||"(画像のみ)")}</div><div class="hiid">${eh(h.id)}${h.permanent?" [PERM]":""}</div><span class="hcp" onclick="event.stopPropagation();cp('${eh(h.url)}')">COPY</span></div>`;
  }).join("");
}
function reuse(i){const h=getH()[i];curUrl=h.url;document.getElementById("rurl").textContent=h.url;document.getElementById("idr").textContent=`id: ${h.id}${h.permanent?" [PERM]":""}`;document.getElementById("oc").classList.add("vis");window.scrollTo({top:0,behavior:"smooth"});}
function cp(s){navigator.clipboard.writeText(s).then(()=>notify("コピーしました"));}

// ── Bug ───────────────────────────────────────────────────
function openBug(){document.getElementById("bmg").classList.add("show");}
function closeBug(){document.getElementById("bmg").classList.remove("show");}
async function subBug(){
  const desc=document.getElementById("bugT").value.trim(),st=document.getElementById("bst");
  if(!desc){st.textContent="内容を入力";st.className="mst er";return;}
  document.getElementById("bugBtn").disabled=true;st.textContent="送信中…";st.className="mst";
  try{const r=await fetch(W+"/report",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({description:desc})});if(!r.ok)throw new Error();st.textContent="✓ 送信しました";st.className="mst ok";document.getElementById("bugT").value="";setTimeout(closeBug,1800);}
  catch(e){st.textContent="エラー";st.className="mst er";}
  finally{document.getElementById("bugBtn").disabled=false;}
}

// ── Notify ────────────────────────────────────────────────
function notify(msg,err=false){const el=document.getElementById("ntf");el.textContent=msg;el.classList.toggle("er",err);el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2400);}
function eh(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

init();
</script>
</body>
</html>
