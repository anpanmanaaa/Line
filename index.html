<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LINE OGP Encoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--panel:#0d0d14;--border:#7fffb230;
  --accent:#7fffb2;--accent2:#ff7f50;--dim:#7fffb260;--text:#e0ffe8;
  --font:'Space Mono',monospace;
  --tap:44px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);min-height:100vh;
  display:flex;flex-direction:column;
}

/* ── menubar（デスクトップ） ── */
.menubar{
  height:30px;background:#111118;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:14px;
  position:sticky;top:0;z-index:200;font-size:11px;color:var(--dim);
  user-select:none;flex-shrink:0;
}
.traffic{display:flex;gap:5px}
.traffic span{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.traffic .r{background:#ff5f57}.traffic .y{background:#ffbd2e}.traffic .g{background:#28c840}
.menu-item{cursor:pointer;padding:2px 6px;transition:color .15s;min-height:var(--tap);display:flex;align-items:center}
.menu-item:hover,.menu-item:active{color:var(--accent)}
.bar-title{flex:1;text-align:center;font-size:10px;letter-spacing:.12em;color:var(--dim)}
.bar-worker{font-size:9px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}

/* ── main ── */
.app{
  flex:1;display:flex;flex-direction:column;
  align-items:center;padding:24px 16px 60px;gap:16px;
  width:100%;
}

.header{text-align:center}
.header h1{font-size:13px;letter-spacing:.25em;color:var(--accent);text-transform:uppercase}
.header p{margin-top:4px;font-size:10px;color:var(--dim);letter-spacing:.08em;line-height:1.6}

/* ── card ── */
.card{
  width:100%;max-width:600px;
  background:var(--panel);border:1px solid var(--border);
  padding:16px;
}
.card-title{
  font-size:9px;letter-spacing:.2em;color:var(--dim);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

label{font-size:10px;letter-spacing:.12em;color:var(--dim);display:block;margin-bottom:6px}

/* inputs */
textarea,input[type="text"]{
  width:100%;background:#13131d;border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:14px;
  padding:10px 12px;outline:none;transition:border-color .2s;
  -webkit-appearance:none;border-radius:0;
}
textarea{resize:vertical;min-height:80px;line-height:1.6}
textarea:focus,input[type="text"]:focus{border-color:var(--accent)}
textarea::placeholder,input::placeholder{color:var(--dim)}

.form-group{margin-bottom:14px}

/* URL row */
.url-row{display:flex;gap:8px}
.url-row input{flex:1;min-width:0}
.url-check{
  flex-shrink:0;font-family:var(--font);font-size:10px;letter-spacing:.1em;
  border:1px solid var(--border);background:transparent;color:var(--dim);
  padding:0 14px;cursor:pointer;white-space:nowrap;
  min-height:var(--tap);transition:border-color .2s,color .2s;
  -webkit-appearance:none;border-radius:0;
}
.url-check:hover,.url-check:active{border-color:var(--accent);color:var(--accent)}
.url-status{margin-top:5px;font-size:10px;min-height:14px;line-height:1}
.url-status.ok{color:var(--accent)}.url-status.err{color:var(--accent2)}

/* drop zone */
.drop-zone{
  border:1px dashed var(--border);background:#13131d;
  min-height:72px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  cursor:pointer;transition:border-color .2s;padding:16px;position:relative;
}
.drop-zone:hover,.drop-zone.dragover,.drop-zone:active{border-color:var(--accent)}
.drop-zone .hint{font-size:10px;color:var(--dim);letter-spacing:.1em;pointer-events:none;text-align:center}
.drop-zone .hint-sub{font-size:9px;color:var(--dim);opacity:.6;pointer-events:none}
.drop-zone input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
  width:100%;height:100%;padding:0;border:none;
}
.img-preview{width:100%;max-height:160px;object-fit:contain;border:1px solid var(--border);display:none;margin-top:8px}
.img-preview.show{display:block}
.img-info{font-size:10px;color:var(--dim);margin-top:4px}

/* buttons */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
button{
  font-family:var(--font);font-size:11px;letter-spacing:.12em;
  cursor:pointer;padding:0 18px;
  min-height:var(--tap);
  border:1px solid var(--accent);background:transparent;color:var(--accent);
  text-transform:uppercase;transition:background .15s,color .15s;
  -webkit-appearance:none;border-radius:0;
  flex:1;
}
button:hover,button:active{background:var(--accent);color:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed}
button.danger{border-color:var(--accent2);color:var(--accent2);flex:0 0 auto}
button.danger:hover,button.danger:active{background:var(--accent2);color:var(--bg)}
button.fixed{flex:0 0 auto}

/* output */
.output-card{display:none}
.output-card.visible{display:block}
.result-url{
  background:#13131d;border:1px solid var(--border);
  padding:12px;font-size:13px;color:var(--accent);
  word-break:break-all;line-height:1.6;position:relative;
  cursor:pointer;
}
.result-url:active{border-color:var(--accent)}
.copy-badge{
  position:absolute;top:6px;right:6px;font-size:8px;
  color:var(--bg);background:var(--accent);padding:2px 8px;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.copy-badge.show{opacity:1}
.id-row{margin-top:6px;font-size:10px;color:var(--dim)}

/* loader */
.loader{display:none;align-items:center;gap:10px;font-size:10px;color:var(--accent);letter-spacing:.1em;margin-top:12px}
.loader.show{display:flex}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* history */
.history-list{display:flex;flex-direction:column;gap:8px}
.hist-item{
  background:var(--panel);border:1px solid var(--border);
  padding:10px 12px;display:flex;align-items:center;
  gap:10px;font-size:12px;cursor:pointer;transition:border-color .15s;
  min-height:var(--tap);
}
.hist-item:hover,.hist-item:active{border-color:var(--accent)}
.hist-thumb{width:36px;height:36px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.hist-thumb-empty{width:36px;height:36px;background:#1a1a25;flex-shrink:0;border:1px solid var(--border)}
.hist-thumb-url{
  width:36px;height:36px;background:#13131d;flex-shrink:0;
  border:1px solid var(--accent2);display:flex;align-items:center;
  justify-content:center;font-size:8px;color:var(--accent2);
}
.hist-text{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.hist-id{color:var(--dim);font-size:9px;flex-shrink:0}
.hist-copy{
  color:var(--accent2);font-size:9px;flex-shrink:0;
  padding:6px 8px;border:1px solid var(--accent2);
  letter-spacing:.08em;
}

/* notif */
.notif{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--accent);color:var(--bg);
  font-size:11px;letter-spacing:.12em;padding:8px 18px;
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;z-index:999;white-space:nowrap;
}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif.err{background:var(--accent2)}

/* ── responsive ── */
@media(min-width:600px){
  button{flex:0 0 auto}
  .menubar{height:26px}
}
@media(max-width:400px){
  .bar-worker{display:none}
  .bar-title{font-size:9px}
}
</style>
</head>
<body>

<div class="menubar">
  <div class="traffic">
    <span class="r"></span><span class="y"></span><span class="g"></span>
  </div>
  <span class="menu-item" onclick="toggleHistory()">History</span>
  <div class="bar-title">LINE OGP ENCODER</div>
  <span class="bar-worker">proud-mode-cd1a</span>
</div>

<div class="app">

  <div class="header">
    <h1>OGP Link Encoder</h1>
    <p>テキスト / URL / 画像 → 短いリンク → LINE プレビュー</p>
  </div>

  <!-- Compose -->
  <div class="card">
    <div class="card-title">COMPOSE</div>

    <div class="form-group">
      <label>メッセージ（省略可）</label>
      <textarea id="msgInput" placeholder="LINEのプレビューに表示するテキスト..."></textarea>
    </div>

    <div class="form-group">
      <label>リンク先URL（省略可）</label>
      <div class="url-row">
        <input type="url" id="urlInput" placeholder="https://example.com" inputmode="url" oninput="onUrlInput()">
        <button class="url-check fixed" onclick="checkUrl()">CHECK</button>
      </div>
      <div class="url-status" id="urlStatus"></div>
    </div>

    <div class="form-group">
      <label>画像（省略可）</label>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(event)">
        <span class="hint">TAP TO SELECT IMAGE</span>
        <span class="hint-sub">or drop here</span>
      </div>
      <img class="img-preview" id="imgPreview" alt="preview">
      <div class="img-info" id="imgInfo"></div>
    </div>

    <div class="btn-row">
      <button id="genBtn" onclick="doGenerate()">Generate Link</button>
      <button class="danger" onclick="clearAll()">Clear</button>
    </div>
    <div class="loader" id="loader">
      <div class="spinner"></div><span>UPLOADING...</span>
    </div>
  </div>

  <!-- Output -->
  <div class="output-card card" id="outputCard">
    <div class="card-title">LINK</div>
    <div style="position:relative" onclick="copyLink()">
      <div class="result-url" id="resultUrl"></div>
      <div class="copy-badge" id="copyBadge">COPIED!</div>
    </div>
    <div class="id-row" id="idRow"></div>
    <div class="btn-row">
      <button onclick="copyLink()">Copy</button>
      <button onclick="openLink()">Open</button>
    </div>
  </div>

  <!-- History -->
  <div class="card" id="historyCard" style="display:none">
    <div class="card-title">HISTORY</div>
    <div class="history-list" id="historyList"></div>
    <div class="btn-row">
      <button class="danger" onclick="clearHistory()">Clear History</button>
    </div>
  </div>

</div>

<div class="notif" id="notif"></div>

<script>
const WORKER_BASE = "https://proud-mode-cd1a.a6068376.workers.dev";
const HIST_KEY    = "ogp_hist_v2";

let currentUrl = "";
let imageB64   = null;
let imageMime  = null;

// ── drag & drop ───────────────────────────────────────────
const dz = document.getElementById("dropZone");
dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("dragover"); });
dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("dragover");
  const f = e.dataTransfer?.files?.[0];
  if (f) loadImage(f);
});
function onFileChange(e) { const f = e.target.files?.[0]; if (f) loadImage(f); }

function loadImage(file) {
  if (!file.type.startsWith("image/")) { notify("画像ファイルを選択してください", true); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r);
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const mime = file.type === "image/png" ? "image/png" : "image/jpeg";
      const b64  = canvas.toDataURL(mime, mime === "image/jpeg" ? 0.82 : undefined);
      imageB64 = b64; imageMime = mime;
      const kb = Math.round(b64.length * 3/4 / 1024);
      document.getElementById("imgPreview").src = b64;
      document.getElementById("imgPreview").classList.add("show");
      document.getElementById("imgInfo").textContent = `${w}×${h}px  ~${kb}KB`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── URL check ────────────────────────────────────────────
function onUrlInput() {
  const el = document.getElementById("urlStatus");
  el.textContent = ""; el.className = "url-status";
}
function checkUrl() {
  const val = document.getElementById("urlInput").value.trim();
  const el  = document.getElementById("urlStatus");
  if (!val) return;
  try { new URL(val); el.textContent = "✓ OK"; el.className = "url-status ok"; }
  catch { el.textContent = "✗ URLの形式が正しくありません"; el.className = "url-status err"; }
}

// ── generate ─────────────────────────────────────────────
async function doGenerate() {
  const text   = document.getElementById("msgInput").value.trim();
  const urlVal = document.getElementById("urlInput").value.trim();
  if (!text && !imageB64 && !urlVal) {
    notify("テキスト・URL・画像のいずれかを入力", true); return;
  }
  if (urlVal) {
    try { new URL(urlVal); }
    catch { notify("URLの形式が正しくありません", true); return; }
  }

  setLoading(true);
  try {
    const body = { text };
    if (urlVal)   { body.url      = urlVal; }
    if (imageB64) { body.imageB64 = imageB64; body.mimeType = imageMime; }

    const res = await fetch(`${WORKER_BASE}/store`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(await res.text());

    const { id, url } = await res.json();
    currentUrl = url;

    document.getElementById("resultUrl").textContent = url;
    document.getElementById("idRow").textContent     = `id: ${id}  (90日)`;
    document.getElementById("outputCard").classList.add("visible");

    const hist  = getHistory();
    const entry = { id, url, text, targetUrl: urlVal, hasImage: !!imageB64, ts: Date.now() };
    localStorage.setItem(HIST_KEY,
      JSON.stringify([entry, ...hist.filter(h => h.id !== id)].slice(0, 30))
    );
    renderHistory();
    notify("生成完了！");

    // スクロールして見せる
    document.getElementById("outputCard").scrollIntoView({ behavior: "smooth", block: "nearest" });
  } catch (err) {
    notify("エラー: " + err.message, true);
  } finally {
    setLoading(false);
  }
}

function setLoading(v) {
  document.getElementById("loader").classList.toggle("show", v);
  document.getElementById("genBtn").disabled = v;
}

function copyLink() {
  if (!currentUrl) return;
  navigator.clipboard.writeText(currentUrl).then(() => {
    const b = document.getElementById("copyBadge");
    b.classList.add("show"); setTimeout(() => b.classList.remove("show"), 1800);
    notify("コピーしました");
  }).catch(() => {
    // iOS fallback
    const ta = document.createElement("textarea");
    ta.value = currentUrl; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    notify("コピーしました");
  });
}
function openLink() { if (currentUrl) window.open(currentUrl, "_blank"); }

function clearAll() {
  document.getElementById("msgInput").value = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("urlStatus").textContent = "";
  document.getElementById("urlStatus").className = "url-status";
  document.getElementById("imgPreview").classList.remove("show");
  document.getElementById("imgPreview").src = "";
  document.getElementById("imgInfo").textContent = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("outputCard").classList.remove("visible");
  imageB64 = null; imageMime = null; currentUrl = "";
}

// ── history ───────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || "[]"); } catch { return []; }
}
function toggleHistory() {
  const c = document.getElementById("historyCard");
  c.style.display = c.style.display === "none" ? "block" : "none";
  if (c.style.display === "block") {
    renderHistory();
    c.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}
function clearHistory() {
  localStorage.removeItem(HIST_KEY); renderHistory(); notify("履歴を削除しました");
}
function renderHistory() {
  const list = document.getElementById("historyList");
  const hist = getHistory();
  if (!hist.length) {
    list.innerHTML = '<div style="font-size:10px;color:var(--dim)">履歴なし</div>'; return;
  }
  list.innerHTML = hist.map((h, i) => {
    let thumb;
    if (h.hasImage)      thumb = `<img class="hist-thumb" src="${WORKER_BASE}/img/${h.id}" alt="">`;
    else if (h.targetUrl)thumb = `<div class="hist-thumb-url">URL</div>`;
    else                  thumb = `<div class="hist-thumb-empty"></div>`;
    return `<div class="hist-item" onclick="reuseHist(${i})">
      ${thumb}
      <div class="hist-text">${escHtml(h.text || h.targetUrl || "(画像のみ)")}</div>
      <div class="hist-id">${escHtml(h.id)}</div>
      <div class="hist-copy" onclick="event.stopPropagation();copyText('${escHtml(h.url)}')">COPY</div>
    </div>`;
  }).join("");
}
function reuseHist(i) {
  const h = getHistory()[i]; currentUrl = h.url;
  document.getElementById("resultUrl").textContent = h.url;
  document.getElementById("idRow").textContent     = `id: ${h.id}`;
  document.getElementById("outputCard").classList.add("visible");
  document.getElementById("outputCard").scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function copyText(s) {
  navigator.clipboard.writeText(s)
    .then(() => notify("コピーしました"))
    .catch(() => {
      const ta = document.createElement("textarea");
      ta.value = s; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      notify("コピーしました");
    });
}

function notify(msg, err = false) {
  const el = document.getElementById("notif");
  el.textContent = msg; el.classList.toggle("err", err);
  el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2200);
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

renderHistory();
</script>
</body>
</html>
